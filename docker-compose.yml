services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: activehikes
      POSTGRES_USER: activehikes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activehikes"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://activehikes:${POSTGRES_PASSWORD}@postgres:5432/activehikes
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - traefik-shared
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-shared"
      - "traefik.http.routers.activehikes.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.activehikes.entrypoints=websecure"
      - "traefik.http.routers.activehikes.tls.certresolver=le"
      - "traefik.http.services.activehikes.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  uploads_data:

networks:
  traefik-shared:
    external: true
